<!DOCTYPE html>
<html>
<head>
    <title>Activity 6 - Login Page</title>
    <link rel="icon" href="lany.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0d0d0d, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #00e5ff33;
            border-radius: 16px;
            padding: 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 0 30px #00e5ff22;
        }
        .login-box h1 {
            font-size: 24px; margin-bottom: 6px;
            color: #00e5ff; text-shadow: 0 0 10px #00e5ff;
        }
        .login-box p { color: #aaa; font-size: 13px; margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 12px 16px; margin-bottom: 14px;
            border-radius: 8px; border: 1px solid #00e5ff44;
            background: rgba(255,255,255,0.07); color: white;
            font-size: 14px; outline: none; transition: border 0.3s;
        }
        .login-box input:focus { border-color: #00e5ff; }
        .login-box button {
            width: 100%; padding: 12px; background: #00e5ff;
            color: #000; font-weight: bold; font-size: 15px;
            border: none; border-radius: 8px; cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .login-box button:hover { background: #00b8cc; box-shadow: 0 0 16px #00e5ff88; }
        .login-box .link { margin-top: 16px; font-size: 13px; color: #aaa; }
        .login-box .link a { color: #00e5ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Welcome Back 🎵</h1>
        <p>Sign in to your account</p>
        <input type="text" placeholder="Username or Email">
        <input type="password" placeholder="Password">
        <button>Login</button>
        <div class="link">Don't have an account? <a href="#">Sign up</a></div>
    </div>
</body>
</html>
