<!DOCTYPE html>
<html>
    <head>
        <title> BUTTON ACTIVITY 2</title>
        <style>
           .uberbutton {
                background-color: #000000;
                border: none;
                color: white;
                padding: 15px 32px;
                text-align: center;
                font-size: 16px;
                margin: 4px 2px;
                cursor: pointer;
            } 
            .amazonbutton {
                background-color: rgb(255, 216, 20);
                border: none;
                color: rgb(0, 0, 0);
                padding: 15px 32px;
                text-align: center;
                font-size: 16px;
                width: 200px;
                margin: 4px 2px;
                border-radius: 49px;
                cursor: pointer;
            }
            .githubbutton {
                background-color: rgb(46, 164, 79);
                border: none;
                color: white;
                padding: 15px 32px;
                text-align: center;
                font-size: 16px;
                margin: 4px 2px;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
            }
            .bootstrapbutton {
                background-color: rgb(121, 82, 179);
                border: none;
                color: rgb(255, 255, 255);
                padding: 15px 32px;
                text-align: center;
                font-size: 16px;
                font-weight: bold;
                margin: 4px 2px;
                border-radius: 8px;
                cursor: pointer;
            } 
            .bootstrap2button {
                background-color: rgb(255, 255, 255);
                border: 1px solid rgb(108, 117, 125);
                color: rgb(108, 117, 125);
                padding: 15px 32px;
                text-align: center;
                font-size: 16px;
                font-weight: bold;
                margin: 4px 2px;
                border-radius: 8px;
                cursor: pointer;
            } 
            .linkedinbutton {
                background-color: rgb(10, 102, 194);
                border: none;
                color: white;
                padding: 15px 32px;
                text-align: center;
                font-size: 16px;
                font-weight: bold;
                margin: 4px 2px;
                border-radius: 49px;
                cursor: pointer;
            }
            .linkedin2button {
                background-color: rgb(255, 255, 255);
                border: 1px solid rgb(10, 102, 194);
                color: rgb(10, 102, 194);
                padding: 15px 32px;
                text-align: center;
                font-size: 16px;
                font-weight: bold;
                margin: 4px 2px;
                border-radius: 49px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <button class="uberbutton"> 
            Request now
        </button>
        <button class="amazonbutton">
            Add to cart
        </button>
        <button class="githubbutton">
            Sign up
        </button>
        <button class="bootstrapbutton">
            Get started
        </button>
        <button class="bootstrap2button">
            Download
        </button>
        <button class="linkedinbutton">
            Apply on company website    
        </button>
        <button class="linkedin2button">
            Save
        </button>   
    </body>
</html>
