<!DOCTYPE html>
<html>
<head>
    <title>Activity 5 - Hero Page</title>
    <link rel="icon" href="lany.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #001a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, #00e5ff22 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .hero { position: relative; max-width: 700px; padding: 40px 20px; }
        .hero-tag {
            font-size: 12px; letter-spacing: 4px;
            color: #00e5ff; text-transform: uppercase; margin-bottom: 16px;
        }
        .hero-title {
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 900; line-height: 1.1; margin-bottom: 20px;
            text-shadow: 0 0 40px #00e5ff44;
        }
        .hero-title span { color: #00e5ff; }
        .hero-sub {
            font-size: 16px; color: #aaa;
            line-height: 1.7; margin-bottom: 36px;
        }
        .hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn-primary {
            padding: 14px 32px; background: #00e5ff; color: #000;
            font-weight: bold; font-size: 15px; border: none;
            border-radius: 8px; cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .btn-primary:hover { background: #00b8cc; box-shadow: 0 0 20px #00e5ff88; }
        .btn-outline {
            padding: 14px 32px; background: transparent;
            color: #00e5ff; font-weight: bold; font-size: 15px;
            border: 2px solid #00e5ff; border-radius: 8px; cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }
        .btn-outline:hover { background: #00e5ff; color: #000; }
    </style>
</head>
<body>
    <div class="hero">
        <p class="hero-tag">✦ Now Playing</p>
        <h1 class="hero-title">Discover the <span>Sound</span><br>of LANY</h1>
        <p class="hero-sub">Dive into the dreamy, emotional world of LANY. Stream the SOFT 2 album and feel every lyric.</p>
        <div class="hero-btns">
            <button class="btn-primary">▶ Play Now</button>
            <button class="btn-outline">Explore Albums</button>
        </div>
    </div>
</body>
</html>
